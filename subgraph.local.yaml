specVersion: 1.2.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: NamespacedCreate3Factory
    network: mainnet
    source:
      address: "0x89e15De5dd9e0DA2A2cb428D832405c69824646B"
      abi: NamespacedCreate3Factory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
          - Deployment
          - Template
      abis:
        - name: NamespacedCreate3Factory
          file: ./abis/NamespacedCreate3Factory.json
        - name: DAOGovernor
          file: ./abis/DAOGovernor.abi.json
      eventHandlers:
        - event: NamespacedDeployment(indexed address,indexed bytes32,uint256,address)
          handler: handleNamespacedDeployment
        - event: TemplateRegistered(indexed bytes32,address)
          handler: handleTemplateRegistered
      file: ./src/namespaced-create-3-factory.ts
  # MultiTenantAuth — singleton authorizer (CREATE3-deterministic). Address
  # and startBlock are stamped per-target by scripts/render-deployment.mjs from
  # config/deployments/<target>.json (multiTenantAuthAddress / mtaStartBlock).
  - kind: ethereum
    name: MultiTenantAuth
    network: mainnet
    source:
      address: "0x233DA861A4635D459bEDA634F154C37dA4bD9BC3"
      abi: MultiTenantAuth
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - SlugConfig
        - Member
        - Role
        - RoleAssignment
        - Permission
        - RolePermission
        - TargetGrant
        - PublicSig
        - OrgContract
      abis:
        - name: MultiTenantAuth
          file: ./abis/MultiTenantAuth.json
      eventHandlers:
        - event: Bootstrapped(indexed bytes32,indexed uint256,address,address[])
          handler: handleBootstrapped
        - event: SuperAdminTransferred(indexed bytes32,indexed uint256,indexed uint256)
          handler: handleSuperAdminTransferred
        - event: SlugPaused(indexed bytes32,indexed address)
          handler: handleSlugPaused
        - event: SlugUnpaused(indexed bytes32,indexed address)
          handler: handleSlugUnpaused
        - event: SlugLocked(indexed bytes32,indexed address)
          handler: handleSlugLocked
        - event: SlugUnlocked(indexed bytes32,indexed address)
          handler: handleSlugUnlocked
        - event: FallbackAuthorizerSet(indexed bytes32,indexed address,indexed address)
          handler: handleFallbackAuthorizerSet
        - event: FoundationContractSet(indexed address)
          handler: handleFoundationContractSet
        - event: OrgContractRegistered(indexed bytes32,indexed address)
          handler: handleOrgContractRegistered
        - event: OrgContractUnregistered(indexed bytes32,indexed address,indexed address)
          handler: handleOrgContractUnregistered
        - event: MemberOnboarded(indexed bytes32,indexed uint256,indexed address,bytes32,uint8)
          handler: handleMemberOnboarded
        - event: MemberAccountTypeSet(indexed bytes32,indexed uint256,uint8)
          handler: handleMemberAccountTypeSet
        - event: MembershipStatusSet(indexed bytes32,indexed uint256,uint8)
          handler: handleMembershipStatusSet
        - event: PaymentStatusSet(indexed bytes32,indexed uint256,uint8)
          handler: handlePaymentStatusSet
        - event: MemberNameSlugSet(indexed bytes32,indexed uint256,bytes32,bytes32)
          handler: handleMemberNameSlugSet
        - event: MemberRemoved(indexed bytes32,indexed uint256,address)
          handler: handleMemberRemoved
        - event: WalletRotated(indexed bytes32,indexed uint256,indexed address,address)
          handler: handleWalletRotated
        - event: RoleAssigned(indexed bytes32,indexed uint256,indexed bytes32,address)
          handler: handleRoleAssigned
        - event: RoleRevoked(indexed bytes32,indexed uint256,indexed bytes32,address)
          handler: handleRoleRevoked
        - event: RoleCreated(indexed bytes32,indexed bytes32,uint8,bool)
          handler: handleRoleCreated
        - event: RoleUpdated(indexed bytes32,indexed bytes32,uint8,bool)
          handler: handleRoleUpdated
        - event: RoleDeleted(indexed bytes32,indexed bytes32)
          handler: handleRoleDeleted
        - event: PermissionCreated(indexed bytes32,indexed uint256,indexed address,bytes4)
          handler: handlePermissionCreated
        - event: PermissionUpdated(indexed bytes32,indexed uint256)
          handler: handlePermissionUpdated
        - event: PermissionDeleted(indexed bytes32,indexed uint256)
          handler: handlePermissionDeleted
        - event: PermissionAttached(indexed bytes32,indexed bytes32,indexed uint256)
          handler: handlePermissionAttached
        - event: PermissionDetached(indexed bytes32,indexed bytes32,indexed uint256)
          handler: handlePermissionDetached
        - event: TargetGrantSet(indexed bytes32,indexed bytes32,indexed address,uint8,address)
          handler: handleTargetGrantSet
        - event: TargetGrantCleared(indexed bytes32,indexed bytes32,indexed address)
          handler: handleTargetGrantCleared
        - event: PublicSigSet(indexed bytes32,indexed address,bytes4,bool)
          handler: handlePublicSigSet
        - event: RateLimitSet(indexed bytes32,indexed uint256,uint32,uint32)
          handler: handleRateLimitSet
      file: ./src/multi-tenant-auth.ts

  - kind: ethereum
    name: ShareTokenFactory
    network: mainnet
    source:
      address: "0x174401AfB79CE41D262e8f961Abe07a10605330a"
      abi: ShareTokenFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ShareTokenDeployed
      abis:
        - name: ShareTokenFactory
          file: ./abis/ShareTokenFactory.json
      eventHandlers:
        - event: ShareTokenDeployed(indexed address,indexed address,string,string,address)
          handler: handleShareTokenDeployed
      file: ./src/share-token-factory.ts
templates:
  - name: SecureValueReserve
    kind: ethereum
    network: mainnet
    source:
      abi: SecureValueReserve
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/secure-value-reserve.ts    
      entities:
        - SVRPolicyProposed
        - SVRPolicyExecuted
        - SVRPolicyCancelled
        - SVRSlotProposed
        - SVRSlotExecuted
        - SVRSlotCancelled
      abis:
        - name: SecureValueReserve
          file: ./abis/SecureValueReserve.json
      eventHandlers:
        - event: ProposePolicyEvent(indexed bytes4,(uint8,uint8,address,uint256),(uint8,uint32,uint32,uint256),uint32)
          handler: handleProposePolicy
        - event: ExecutePolicyEvent(indexed bytes4,(uint8,uint8,address,uint256),(uint8,uint32,uint32,uint256))
          handler: handleExecutePolicy
        - event: CancelPolicyEvent(indexed bytes4,(uint8,uint8,address,uint256))
          handler: handleCancelPolicy
        - event: ProposeEvent(indexed bytes4,uint256,uint32)
          handler: handleProposeSlot
        - event: ExecuteEvent(indexed bytes4,uint256)
          handler: handleExecuteSlot
        - event: CancelEvent(indexed bytes4)
          handler: handleCancelSlot

  - name: DAOGovernor
    kind: ethereum
    network: mainnet
    source:
      abi: DAOGovernor
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/dao-governor.ts
      entities:
        - DAOGovernorInstance
        - DAOProposal
        - DAOVote
      abis:
        - name: DAOGovernor
          file: ./abis/DAOGovernor.abi.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: VoteCastWithParams(indexed address,uint256,uint8,uint256,string,bytes)
          handler: handleVoteCastWithParams

