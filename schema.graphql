# ─────────────────────────────────────────────────────────────────────────────
# MultiTenantAuth (MTA) — singleton per chain. All orgs share one instance;
# every entity is keyed by a per-org "slug" (bytes32). Mappings live in
# src/multi-tenant-auth.ts. See BareBonesDiamond/docs/multi-tenant-auth-roles.md
# for the auth model. We index the events that establish stable on-chain state
# (members, roles, permissions, org-contract registry, slug pause/lock state)
# and defer the high-frequency / read-mostly streams (rate-limit state,
# `Executed`, target-grant cache, public-sig flags).
# ─────────────────────────────────────────────────────────────────────────────

enum SlugStateEnum {
  Normal
  Paused
  Locked
}

# One row per bootstrapped org. Created from `Bootstrapped`; mutated by
# pause/unpause/lock/unlock and `SuperAdminTransferred`.
type SlugConfig @entity(immutable: false) {
  id: ID!                             # slug.toHexString()
  slug: Bytes!
  superAdminId: BigInt                # memberId of the current super admin
  superAdmin: Bytes                   # wallet snapshot of the super admin (rotates with WalletRotated)
  fallbackAuthorizer: Bytes
  state: SlugStateEnum!
  bootstrapped: Boolean!
  bootstrapTime: BigInt
  initialAdmins: [Bytes!]
}

# One row per memberId — the contract's stable global identity. `wallet` is the
# member's *current* address and is mutable: WalletRotated updates it without
# changing memberId. `role` mirrors the latest active assignment for fast UI
# lookups; the historical trail lives in RoleAssignment.
type Member @entity(immutable: false) {
  id: ID!                             # memberId.toString()
  memberId: BigInt!
  slug: Bytes!
  wallet: Bytes!                      # mutable — refreshed on WalletRotated
  nameSlug: Bytes
  accountType: Int                    # AccountType enum: 0=Member, 1=Investor, 2=AuthorizedUser, 3=Payee
  membershipStatus: Int               # MembershipStatus enum: 0=Active, 1=Terminated
  paymentStatus: Int                  # PaymentStatus enum: 0=Active, 1=Deactivated
  role: Bytes                         # current roleSlug; null when revoked / removed
  dateAdded: BigInt!
  removedAt: BigInt
}

# Append-only audit trail of wallet rotations. memberId is the stable identity;
# previousWallet is the address before the rotation, newWallet is the address
# after. `Member.wallet` always reflects the most recent newWallet.
type WalletRotation @entity(immutable: true) {
  id: ID!                             # txHash-logIndex
  memberId: BigInt!
  slug: Bytes!
  previousWallet: Bytes!
  newWallet: Bytes!
  rotatedAt: BigInt!
}

# One row per (slug, roleSlug). System roles (Admin, Pauser, etc.) are
# synthesized — they never get RoleCreated events. We mark them via
# `isSystemRole` when we encounter assignments referencing them.
type Role @entity(immutable: false) {
  id: ID!                             # slug-roleSlug
  slug: Bytes!
  roleSlug: Bytes!
  appliesTo: Int                      # bitmask: Member|Investor|Contractor
  isDefault: Boolean
  isCustom: Boolean!
  isSystemRole: Boolean!
  createdAt: BigInt
  deletedAt: BigInt
}

# One row per (memberId, roleSlug) assignment. Append-only history; the
# active-assignment pointer lives on `Member.role`. Keyed on memberId (stable)
# rather than wallet (mutable) so the history survives wallet rotations.
type RoleAssignment @entity(immutable: false) {
  id: ID!                             # memberId-roleSlug
  memberId: BigInt!
  slug: Bytes!
  wallet: Bytes!                      # snapshot of the member's wallet at grant time
  roleSlug: Bytes!
  grantedAt: BigInt!
  revokedAt: BigInt
}

# One row per (slug, permId). Permissions are now first-class slug-scoped
# entities — they exist independently of any role and can be attached to many
# roles via the RolePermission junction below. The `PermissionCreated` event
# carries (slug, permId, target, sig); other spec fields (mode, validity,
# rate limit) need a future cross-event reconciler reading the contract or
# decoding the originating calldata. `RateLimitSet` mirrors rate fields when
# they're set.
type Permission @entity(immutable: false) {
  id: ID!                             # slug-permId
  slug: Bytes!
  permId: BigInt!
  target: Bytes!
  sig: Bytes!
  mode: Int                           # PermissionMode enum: 0=Whitelist, 1=Blacklist, 2=Custom
  customAuthorizer: Bytes
  validFrom: BigInt
  validUntil: BigInt
  hasConstraints: Boolean
  constraints: Bytes
  rateMaxCalls: BigInt                # mirrored from RateLimitSet
  rateWindowSeconds: BigInt           # mirrored from RateLimitSet
  createdAt: BigInt!
  updatedAt: BigInt!
  deletedAt: BigInt
}

# Junction between Role and Permission. One row per (slug, role, permId)
# attachment. Created on PermissionAttached; soft-deleted on PermissionDetached
# / PermissionDeleted via `detachedAt` so the historical trail is preserved.
type RolePermission @entity(immutable: false) {
  id: ID!                             # slug-role-permId
  slug: Bytes!
  roleSlug: Bytes!
  permId: BigInt!
  attachedAt: BigInt!
  detachedAt: BigInt
}

# One row per (slug, role, target). Updated by TargetGrantSet/Cleared.
type TargetGrant @entity(immutable: false) {
  id: ID!                             # slug-role-target
  slug: Bytes!
  role: Bytes!
  target: Bytes!
  mode: Int!                          # TargetMode enum
  customAddr: Bytes
  updatedAt: BigInt!
  clearedAt: BigInt
}

# One row per (slug, target, sig).
type PublicSig @entity(immutable: false) {
  id: ID!                             # slug-target-sig
  slug: Bytes!
  target: Bytes!
  sig: Bytes!
  isPublic: Boolean!
  updatedAt: BigInt!
}

# One row per registered or foundation contract. Foundation rows are
# created at MTA constructor time (slug = zero bytes32).
type OrgContract @entity(immutable: false) {
  id: ID!                             # target address
  slug: Bytes                         # null for foundation rows
  target: Bytes!
  registeredAt: BigInt
  unregisteredAt: BigInt
  isFoundation: Boolean!
}

# Cap table — a ShareToken (per-org equity register) deployed via ShareTokenFactory.
# The frontend resolves an org's cap-table address from this index (by owner). See
# BareBonesDiamond/CAPTABLE.md and the partner-template shareTokenResolver.
type ShareTokenDeployed @entity(immutable: true) {
  id: ID! # shareToken address (lowercased hex)
  shareToken: Bytes!
  owner: Bytes!
  name: String!
  symbol: String!
  complianceSBT: Bytes!
  blockNumber: BigInt!
  createdAt: BigInt!
  txHash: Bytes!
}

# Cap-table distributions — payouts to share holders against a funded pool.
# Indexed from the singleton DistributionManager (CREATE3-deterministic).
type Distribution @entity(immutable: false) {
  id: ID!                 # decimal distribution id as string
  distributionId: BigInt!
  slug: Bytes!
  shareToken: Bytes!
  label: Bytes!           # bytes32 UTF-8 name
  recordDate: BigInt!
  funded: BigInt!
  paid: BigInt!
  status: String!         # "Processing" | "Done" | "Cancelled"
  createdAt: BigInt!
  updatedAt: BigInt!
  txHash: Bytes!
  payouts: [DistributionPayout!]! @derivedFrom(field: "distribution")
}

type DistributionPayout @entity(immutable: true) {
  id: ID!                 # txHash-logIndex
  distribution: Distribution!
  classId: BigInt!
  holder: Bytes!
  amount: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

# Cap-table share classes — indexed per ShareToken (dynamic template).
type ShareClass @entity(immutable: false) {
  id: ID!                 # <shareToken-lowercased>-<classId>
  shareToken: Bytes!
  classId: BigInt!
  name: String!
  voteWeightBps: Int!
  status: String!         # "Active" | "Retired" | "Removed"
  createdAt: BigInt!
}

type Grant @entity(immutable: false) {
  id: ID!                 # <shareToken-lowercased>-<grantId>
  shareToken: Bytes!
  grantId: BigInt!
  classId: BigInt!
  holder: Bytes!
  amount: BigInt!         # current granted amount (decremented by forfeitures)
  status: String!         # "Active" | "Settled" | "Cancelled" | "ClawedBack"
  forfeited: BigInt!
  createdAt: BigInt!
  updatedAt: BigInt!
  txHash: Bytes!
}

type ShareHolding @entity(immutable: false) {
  id: ID!                 # <shareToken-lowercased>-<classId>-<holder-lowercased>
  shareToken: Bytes!
  classId: BigInt!
  holder: Bytes!
  balance: BigInt!        # net held shares for this (class, holder)
  updatedAt: BigInt!
}

# ─────────────────────────────────────────────────────────────────────────────
# ShareLendingMarket — singleton peer-to-peer collateralized lending against
# cap-table (SPV) shares. CREATE3-deterministic, keyed per-org by `slug`.
# Mappings live in src/share-lending-market.ts. Several listing/quote/loan fields
# the UI needs are not in the events; the handlers read them via eth_call against
# the public getters (listings/quotes/loans). See BareBonesDiamond/SHARE_LENDING.md.
# ─────────────────────────────────────────────────────────────────────────────

type LendingListing @entity(immutable: false) {
  id: ID!            # `${slug.toHexString()}-${listingId}`
  market: Bytes!
  slug: Bytes!
  listingId: BigInt!
  borrower: Bytes!
  classId: BigInt!
  shares: BigInt!
  wantAmount: BigInt!
  maxRateBps: Int!
  termSeconds: BigInt!
  metadataHash: Bytes!
  requireDeposit: Boolean!
  depositAmount: BigInt!
  status: String!     # "Open" | "Accepted" | "Closed"
  loanId: BigInt
  createdAt: BigInt!
  updatedAt: BigInt!
  txHash: Bytes!
  quotes: [LendingQuote!]! @derivedFrom(field: "listing")
  loan: LendingLoan
}

type LendingQuote @entity(immutable: false) {
  id: ID!            # `${slug.toHexString()}-${listingId}-${quoteId}`
  listing: LendingListing!
  slug: Bytes!
  listingId: BigInt!
  quoteId: BigInt!
  lender: Bytes!
  amount: BigInt!
  rateBps: Int!
  termSeconds: BigInt!
  expiry: BigInt!
  deposit: BigInt!
  mediator: Bytes!
  status: String!     # "Open" | "Accepted" | "Rejected" | "Funded" | "Withdrawn"
  createdAt: BigInt!
  updatedAt: BigInt!
}

type LendingLoan @entity(immutable: false) {
  id: ID!            # `${slug.toHexString()}-${loanId}`
  slug: Bytes!
  loanId: BigInt!
  listing: LendingListing!
  listingId: BigInt!
  quoteId: BigInt!
  borrower: Bytes!
  lender: Bytes!
  classId: BigInt!
  shares: BigInt!
  principal: BigInt!
  rateBps: Int!
  penaltyRateBps: Int!
  termSeconds: BigInt!
  acceptedAt: BigInt!
  startedAt: BigInt
  maturity: BigInt
  mediator: Bytes!
  status: String!     # "Accepted" | "Active" | "Repaid" | "Foreclosed" | "Released"
  updatedAt: BigInt!
}

type LendingOrg @entity(immutable: false) {
  id: ID!            # slug.toHexString()
  slug: Bytes!
  shareToken: Bytes!
  market: Bytes!
  updatedAt: BigInt!
}
